services:
  mongodb:
    image: mongo:6.0
    container_name: nosql_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7.2-alpine
    container_name: nosql_redis
    ports:
      - "6379:6379"
  app:
    build: .
    container_name: nosql_app
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/catalogo
      - REDIS_URI=redis://redis:6379
      - PORT=3000
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
volumes:
  mongo_data: